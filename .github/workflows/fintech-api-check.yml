name: Fintech API Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run daily at 6 AM UTC
    - cron: '0 6 * * *'

jobs:
  api-tests:
    name: API Tests & Security Validation
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Install Playwright browsers
      run: npx playwright install --with-deps
      
    - name: Create .env file from GitHub Secrets
      run: |
        cat > .env << EOF
        FINTECH_USERNAME=${{ secrets.FINTECH_USERNAME }}
        FINTECH_PASSWORD=${{ secrets.FINTECH_PASSWORD }}
        CLIENT_ID=${{ secrets.CLIENT_ID }}
        DISCOVERY_ID=${{ secrets.DISCOVERY_ID }}
        MFA_SECRET=${{ secrets.MFA_SECRET }}
        DEFAULT_CURRENCY=${{ secrets.DEFAULT_CURRENCY || 'USD' }}
        BASE_URL=${{ secrets.BASE_URL || 'https://demo.fintech.com' }}
        EOF
        
    - name: Validate environment configuration
      run: npx ts-node src/test-e2e-config.ts
      
    - name: Run API Tests
      run: npx playwright test tests/api/ --reporter=html,json, junit
      
    - name: Upload Playwright HTML Report
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report-${{ matrix.node-version }}
        path: playwright-report/
        retention-days: 7
        
    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.node-version }}
        path: test-results/
        retention-days: 7
        
    - name: Upload JUnit XML Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: junit-results-${{ matrix.node-version }}
        path: test-results/results.xml
        retention-days: 7

  security-scan:
    name: Security & Infrastructure ID Validation
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Create .env file from GitHub Secrets
      run: |
        cat > .env << EOF
        FINTECH_USERNAME=${{ secrets.FINTECH_USERNAME }}
        FINTECH_PASSWORD=${{ secrets.FINTECH_PASSWORD }}
        CLIENT_ID=${{ secrets.CLIENT_ID }}
        DISCOVERY_ID=${{ secrets.DISCOVERY_ID }}
        MFA_SECRET=${{ secrets.MFA_SECRET }}
        DEFAULT_CURRENCY=${{ secrets.DEFAULT_CURRENCY || 'USD' }}
        BASE_URL=${{ secrets.BASE_URL || 'https://demo.fintech.com' }}
        EOF
        
    - name: Run Security Tests
      run: npx ts-node src/test-security-final.ts
      
    - name: Verify Infrastructure ID Masking
      run: |
        echo "Testing infrastructure ID masking..."
        CLIENT_ID_TEST="${{ secrets.CLIENT_ID }}"
        if [[ "$CLIENT_ID_TEST" == *"demo-client-id"* ]]; then
          echo "CLIENT_ID detected, masking verification required"
          npx ts-node -e "
          import { logger } from './src/utils/Logger';
          const masked = logger.maskInfrastructureIds('$CLIENT_ID_TEST');
          console.log('Original:', '$CLIENT_ID_TEST');
          console.log('Masked:', masked);
          if (masked === '********') {
            console.log('Infrastructure ID masking: SUCCESS');
            process.exit(0);
          } else {
            console.log('Infrastructure ID masking: FAILED');
            process.exit(1);
          }
          "
        else
          echo "CLIENT_ID pattern not detected, skipping masking test"
        fi

  localization-tests:
    name: Localization & Currency Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Create .env file from GitHub Secrets
      run: |
        cat > .env << EOF
        FINTECH_USERNAME=${{ secrets.FINTECH_USERNAME }}
        FINTECH_PASSWORD=${{ secrets.FINTECH_PASSWORD }}
        CLIENT_ID=${{ secrets.CLIENT_ID }}
        DISCOVERY_ID=${{ secrets.DISCOVERY_ID }}
        MFA_SECRET=${{ secrets.MFA_SECRET }}
        DEFAULT_CURRENCY=${{ secrets.DEFAULT_CURRENCY || 'USD' }}
        BASE_URL=${{ secrets.BASE_URL || 'https://demo.fintech.com' }}
        EOF
        
    - name: Run Transaction Tests
      run: npx ts-node src/test-transaction.ts
      
    - name: Run Currency Utils Tests
      run: npx ts-node -e "
      import { CurrencyUtils } from './src/utils/CurrencyUtils';
      const utils = CurrencyUtils.getInstance();
      
      // Test currency formatting
      console.log('Testing currency formatting...');
      const usd = utils.formatCurrency(1234.56, 'USD');
      const eur = utils.formatCurrency(1234.56, 'EUR');
      console.log('USD:', usd);
      console.log('EUR:', eur);
      
      // Test date formatting
      const usdDate = utils.getExpectedDateFormat('USD');
      const eurDate = utils.getExpectedDateFormat('EUR');
      console.log('USD Date Format:', usdDate);
      console.log('EUR Date Format:', eurDate);
      
      console.log('Localization tests: SUCCESS');
      "

  code-quality:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: TypeScript Compilation Check
      run: npx tsc --noEmit
      
    - name: Check for sensitive data in code
      run: |
        echo "Checking for potential sensitive data exposure..."
        
        # Check for hardcoded passwords or secrets
        if grep -r -i "password.*=" src/ --include="*.ts" --include="*.js"; then
          echo "WARNING: Potential hardcoded passwords found"
          exit 1
        fi
        
        # Check for unmasked infrastructure IDs
        if grep -r "demo-client-id-[0-9]" src/ --include="*.ts" --include="*.js"; then
          echo "WARNING: Unmasked infrastructure IDs found in source code"
          exit 1
        fi
        
        echo "Code quality check: SUCCESS"

  notify:
    name: Notification
    runs-on: ubuntu-latest
    needs: [api-tests, security-scan, localization-tests, code-quality]
    if: always()
    
    steps:
    - name: Notify Success
      if: ${{ needs.api-tests.result == 'success' && needs.security-scan.result == 'success' && needs.localization-tests.result == 'success' && needs.code-quality.result == 'success' }}
      run: |
        echo "All tests passed successfully! Fintech API Check: SUCCESS"
        
    - name: Notify Failure
      if: ${{ needs.api-tests.result == 'failure' || needs.security-scan.result == 'failure' || needs.localization-tests.result == 'failure' || needs.code-quality.result == 'failure' }}
      run: |
        echo "Some tests failed. Please check the artifacts and logs."
        echo "API Tests: ${{ needs.api-tests.result }}"
        echo "Security Scan: ${{ needs.security-scan.result }}"
        echo "Localization Tests: ${{ needs.localization-tests.result }}"
        echo "Code Quality: ${{ needs.code-quality.result }}"
        exit 1
